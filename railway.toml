# Railway 배포 설정 (weekly_suggest 루트 기준)
#
# 빌드 흐름:
#   1. Nixpacks가 루트의 requirements.txt + runtime.txt로 Python 3.11 환경 구성
#   2. pip install -r requirements.txt (→ backend/requirements.txt 포함)
#   3. startCommand로 backend/ 에서 uvicorn 실행

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
